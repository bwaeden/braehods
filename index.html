  <!-- MODAL ─────────────────────────────────────── -->
  <div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Send a message</h2>
        <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
      </div>
      <p class="modal-sub">Business, collabs, or anything else.</p>

      <div id="form-body">
        <form id="contact-form" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label for="c-name">Name</label>
            <input id="c-name" name="name" type="text" placeholder="Your name" required autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="c-email">Email</label>
            <input id="c-email" name="email" type="email" placeholder="your@email.com" required autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="c-message">Message</label>
            <textarea id="c-message" name="message" placeholder="What's on your mind?" required></textarea>
          </div>
          <button class="form-submit" type="submit" id="submit-btn">Send</button>
          <p class="form-error" id="form-error"></p>
        </form>
      </div>

      <div class="modal-success" id="modal-success">
        <div class="check">
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <div>
          <p class="success-title">Message sent.</p>
          <p class="success-sub">I'll get back to you soon.</p>
        </div>
        <button class="close-success" onclick="closeModal()">Close</button>
      </div>

    </div>
  </div>


  <script>
    function openModal() {
      document.getElementById('overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(() => document.getElementById('c-name').focus(), 80);
    }
    function closeModal() {
      document.getElementById('overlay').classList.remove('open');
      document.body.style.overflow = '';
      // Reset after transition
      setTimeout(() => {
        document.getElementById('form-body').style.display = 'block';
        document.getElementById('modal-success').classList.remove('show');
        const btn = document.getElementById('submit-btn');
        btn.disabled = false; btn.textContent = 'Send';
        document.getElementById('contact-form').reset();
        document.getElementById('form-error').classList.remove('show');
      }, 300);
    }
    function handleOverlayClick(e) {
      if (e.target === document.getElementById('overlay')) closeModal();
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    async function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errorEl = document.getElementById('form-error');
      const form = document.getElementById('contact-form');

      btn.disabled = true; btn.textContent = 'Sending…';
      errorEl.classList.remove('show');

      if (FORMSPREE_ID === 'YOUR_FORM_ID') {
        errorEl.textContent = 'Contact form not configured yet.';
        errorEl.classList.add('show');
        btn.disabled = false; btn.textContent = 'Send';
        return;
      }

      try {
        const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
          method: 'POST', body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          document.getElementById('form-body').style.display = 'none';
          document.getElementById('modal-success').classList.add('show');
          // No auto-close — user closes manually via the Close button or Escape
        } else { throw new Error(); }
      } catch {
        errorEl.textContent = 'Something went wrong. Try again.';
        errorEl.classList.add('show');
        btn.disabled = false; btn.textContent = 'Send';
      }
    }
  </script>
